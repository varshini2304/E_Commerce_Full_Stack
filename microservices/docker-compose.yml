version: "3.8"

services:

  # ══════════════════════════════════════════════
  #  INFRASTRUCTURE
  # ══════════════════════════════════════════════

  mongodb:
    image: mongo:7.0
    container_name: ecommerce-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ecommerce-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: ecommerce-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ecommerce-kafka
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10

  # ══════════════════════════════════════════════
  #  MICROSERVICES
  # ══════════════════════════════════════════════

  product-service:
    build: ./product-service
    container_name: ecommerce-product-service
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/product_db
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8081
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  order-service:
    build: ./order-service
    container_name: ecommerce-order-service
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/order_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8082
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  payment-service:
    build: ./payment-service
    container_name: ecommerce-payment-service
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/payment_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8083
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  inventory-service:
    build: ./inventory-service
    container_name: ecommerce-inventory-service
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/inventory_db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SERVER_PORT: 8084
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ecommerce-net

  vendor-service:
    build: ./vendor-service
    container_name: ecommerce-vendor-service
    restart: unless-stopped
    ports:
      - "8085:8085"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/vendor_db
      APP_JWT_SECRET: f0e1d2c3b4a5968778695a4b3c2d1e0f9a8b7c6d5e4f3021a9b8c7d6e5f40312
      SERVER_PORT: 8085
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - ecommerce-net

  api-gateway:
    build: ./api-gateway
    container_name: ecommerce-api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_PORT: 8080
      APP_JWT_SECRET: f0e1d2c3b4a5968778695a4b3c2d1e0f9a8b7c6d5e4f3021a9b8c7d6e5f40312
      # Override route URIs to use Docker service names
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://product-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/products/**
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: product-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://product-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/api/categories/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: category-service
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://order-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0: Path=/api/orders/**
      SPRING_CLOUD_GATEWAY_ROUTES_2_ID: order-service
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: http://payment-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0: Path=/api/payments/**
      SPRING_CLOUD_GATEWAY_ROUTES_3_ID: payment-service
      SPRING_CLOUD_GATEWAY_ROUTES_4_URI: http://inventory-service:8084
      SPRING_CLOUD_GATEWAY_ROUTES_4_PREDICATES_0: Path=/api/inventory/**
      SPRING_CLOUD_GATEWAY_ROUTES_4_ID: inventory-service
      SPRING_CLOUD_GATEWAY_ROUTES_5_URI: http://order-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_5_PREDICATES_0: Path=/api/cart/**
      SPRING_CLOUD_GATEWAY_ROUTES_5_ID: cart-service
      SPRING_CLOUD_GATEWAY_ROUTES_6_URI: http://monolith:8000
      SPRING_CLOUD_GATEWAY_ROUTES_6_PREDICATES_0: Path=/api/auth/**,/api/users/**,/api/reviews/**,/api/site/**,/api/home/**
      SPRING_CLOUD_GATEWAY_ROUTES_6_ID: monolith-auth
      SPRING_CLOUD_GATEWAY_ROUTES_7_URI: http://vendor-service:8085
      SPRING_CLOUD_GATEWAY_ROUTES_7_PREDICATES_0: Path=/api/vendors/**
      SPRING_CLOUD_GATEWAY_ROUTES_7_ID: vendor-service
    depends_on:
      - product-service
      - order-service
      - payment-service
      - inventory-service
      - vendor-service
      - monolith
    networks:
      - ecommerce-net

  monolith:
    build: ../server-spring
    container_name: ecommerce-monolith
    ports:
      - "8000:8000"
    environment:
      - SERVER_PORT=8000
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    networks:
      - ecommerce-net
    extra_hosts:
      - "host.docker.internal:host-gateway"

# ══════════════════════════════════════════════
#  VOLUMES & NETWORKS
# ══════════════════════════════════════════════

volumes:
  mongo_data:
  redis_data:

networks:
  ecommerce-net:
    driver: bridge
