spring:
  application:
    name: ecommerce-backend

  # ── MySQL ──
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 30000
      connection-timeout: 20000

  # ── JPA / Hibernate ──
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── Redis ──
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

  # ── Cache ──
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false

  # ── Jackson ──
  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# ── Server ──
server:
  port: 5000

# ── App Custom Properties ──
app:
  jwt:
    secret: f0e1d2c3b4a5968778695a4b3c2d1e0f9a8b7c6d5e4f3021a9b8c7d6e5f40312
    expiration: 86400000
  cors:
    allowed-origins: http://localhost:5173

# ── Logging ──
logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
